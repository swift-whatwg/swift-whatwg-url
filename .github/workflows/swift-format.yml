name: Swift Format

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: swift-format-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # swift-format + auto-commit — see
  # swift-institute/.github/.github/workflows/swift-format.yml
  format:
    permissions:
      contents: write
    uses: swift-institute/.github/.github/workflows/swift-format.yml@v1
