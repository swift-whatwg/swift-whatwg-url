name: SwiftLint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: swiftlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # SwiftLint strict — see
  # swift-institute/.github/.github/workflows/swiftlint.yml
  lint:
    uses: swift-institute/.github/.github/workflows/swiftlint.yml@v1
